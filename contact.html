<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Contact — Invest Heimish</title>
  <meta name="description" content="Get in touch with Invest Heimish. We're here to answer your questions about real estate investment opportunities and help you take your first step.">
  <link rel="canonical" href="https://investheimish.com/contact.html">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page">

    <!-- Hero -->
    <section class="contact-hero">
      <h1>Talk to Us</h1>
      <p>We're here to answer all your questions</p>
    </section>

    <!-- Contact content -->
    <section class="section">
      <div class="contact-grid">

        <!-- Form -->
        <div class="contact-form" id="contact-form-wrap">
          <form id="contact-form">
            <div class="form-group">
              <label for="name">Name</label>
              <input type="text" id="name" placeholder="Your name" required>
            </div>
            <div class="form-group">
              <label for="phone">Phone</label>
              <input type="tel" id="phone" placeholder="Your phone number" required>
            </div>
            <div class="form-group">
              <label for="email">Email (optional)</label>
              <input type="email" id="email" placeholder="Your email">
            </div>
            <div class="form-group">
              <label for="interest">What interests you?</label>
              <select id="interest">
                <option value="">Choose...</option>
                <option value="specific-deal">A specific deal</option>
                <option value="general">General information</option>
                <option value="custom">I'm looking for something specific</option>
              </select>
            </div>
            <div class="form-group">
              <label for="message">Message</label>
              <textarea id="message" placeholder="Write your message here..."></textarea>
            </div>
            <button type="submit" class="btn btn-primary" style="width: 100%; padding: 0.9rem;">Send Message</button>
          </form>

          <div class="form-success" id="form-success">
            <h3>Thank you!</h3>
            <p>We've received your message and will be in touch soon.</p>
          </div>
        </div>

        <!-- Contact info cards -->
        <div class="contact-info">
          <a class="contact-info-card" id="whatsapp-link" href="#" target="_blank" rel="noopener">
            <div class="contact-icon">💬</div>
            <div>
              <h3>WhatsApp</h3>
              <p id="whatsapp-display"></p>
            </div>
          </a>

          <a class="contact-info-card" id="phone-link" href="#">
            <div class="contact-icon">📞</div>
            <div>
              <h3>Call</h3>
              <p id="phone-display"></p>
            </div>
          </a>

          <a class="contact-info-card" id="email-link" href="#">
            <div class="contact-icon">✉️</div>
            <div>
              <h3>Email</h3>
              <p id="email-display"></p>
            </div>
          </a>

          <div class="contact-info-card">
            <div class="contact-icon">🕐</div>
            <div>
              <h3>Hours</h3>
              <p>Sunday – Thursday, 9:00 AM – 6:00 PM</p>
            </div>
          </div>

          <div class="contact-info-card">
            <div class="contact-icon">📍</div>
            <div>
              <h3>Location</h3>
              <p>New York / New Jersey</p>
            </div>
          </div>
        </div>

      </div>
    </section>

  </div>

  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", function() {
      // Wire up contact links
      var waMsg = encodeURIComponent("Hi, I'd like to get more information about investment deals");
      document.getElementById("whatsapp-link").href = "https://wa.me/" + WHATSAPP_NUMBER + "?text=" + waMsg;
      document.getElementById("whatsapp-display").textContent = CONTACT_PHONE_DISPLAY;
      document.getElementById("phone-link").href = "tel:+" + WHATSAPP_NUMBER;
      document.getElementById("phone-display").textContent = CONTACT_PHONE_DISPLAY;
      document.getElementById("email-link").href = "mailto:" + CONTACT_EMAIL;
      document.getElementById("email-display").textContent = CONTACT_EMAIL;

      // Form handling (demo — just shows success)
      document.getElementById("contact-form").addEventListener("submit", function(e) {
        e.preventDefault();
        this.style.display = "none";
        document.getElementById("form-success").classList.add("show");
      });
    });
  </script>
</body>
</html>
