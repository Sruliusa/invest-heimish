<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deals — Invest Heimish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page">

    <section class="section" style="background: #F5F0EA; padding-top: 2.5rem;">
      <div class="section-header">
        <h2 class="section-title">All Deals</h2>
        <p class="section-subtitle">Choose a deal that fits you</p>
      </div>

      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all">All</button>
        <button class="filter-btn" data-filter="low">Low Risk</button>
        <button class="filter-btn" data-filter="medium">Medium Risk</button>
      </div>

      <div class="deals-grid" id="all-deals"></div>
    </section>

    <!-- CTA band -->
    <section class="cta-band">
      <h2>Don't see what you're looking for?</h2>
      <p>We have more deals coming soon — let us know what you're looking for</p>
      <a class="btn btn-gold" href="contact.html">Talk to Us</a>
    </section>

  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    function createDealCard(deal) {
      var card = document.createElement("article");
      card.className = "deal-card";
      card.setAttribute("data-risk", deal.riskKey);
      card.innerHTML =
        '<img class="card-image" src="' + deal.image + '" alt="' + deal.name + '" loading="lazy">' +
        '<div class="card-body">' +
          '<div class="card-badges">' +
            '<span class="badge badge-location">' + deal.location + '</span>' +
            '<span class="badge badge-type">' + deal.propertyType + '</span>' +
          '</div>' +
          (deal.saleStatus ? '<div class="sale-status-badge sale-status-' + deal.saleStatus + '">' + (deal.saleStatus === 'contract' ? 'Contract for Sale' : 'Sold') + '</div>' : '') +
          '<h3 class="card-title">' + deal.name + '</h3>' +
          '<div class="card-stats">' +
            '<div class="card-stat">' +
              '<div class="card-stat-label">Purchase Price</div>' +
              '<div class="card-stat-value">' + fmt(deal.purchasePrice) + '</div>' +
            '</div>' +
            '<div class="card-stat">' +
              '<div class="card-stat-label">Expected Profit</div>' +
              '<div class="card-stat-value profit">' + fmt(deal.expectedProfit) + '</div>' +
            '</div>' +
            '<div class="card-stat">' +
              '<div class="card-stat-label">Monthly Income</div>' +
              '<div class="card-stat-value">' + fmt(deal.monthlyIncome) + '</div>' +
            '</div>' +
            '<div class="card-stat">' +
              '<div class="card-stat-label">Risk</div>' +
              '<div class="card-stat-value"><span class="risk-badge risk-' + deal.riskKey + '">' + deal.riskLevel + '</span></div>' +
            '</div>' +
          '</div>' +
          '<div class="card-footer">' +
            '<a class="btn btn-primary" href="deal.html?id=' + deal.id + '">More Details</a>' +
            '<a class="btn btn-whatsapp" href="' + whatsappLink(deal.name) + '" target="_blank" rel="noopener">WhatsApp</a>' +
          '</div>' +
        '</div>';
      return card;
    }

    document.addEventListener("DOMContentLoaded", async function() {
      var grid = document.getElementById("all-deals");
      var allDeals = await loadDeals();
      allDeals.forEach(function(deal) {
        grid.appendChild(createDealCard(deal));
      });

      // Filter logic
      var buttons = document.querySelectorAll(".filter-btn");
      buttons.forEach(function(btn) {
        btn.addEventListener("click", function() {
          buttons.forEach(function(b) { b.classList.remove("active"); });
          btn.classList.add("active");

          var filter = btn.getAttribute("data-filter");
          var cards = grid.querySelectorAll(".deal-card");
          cards.forEach(function(card) {
            if (filter === "all" || card.getAttribute("data-risk") === filter) {
              card.style.display = "";
            } else {
              card.style.display = "none";
            }
          });
        });
      });
    });
  </script>
</body>
</html>
