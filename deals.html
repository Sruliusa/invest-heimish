<!DOCTYPE html>
<html lang="yi" dir="rtl">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>דיעלס — אינוועסטירן קלוג</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Heebo:wght@400;500;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page">

    <section class="section" style="background: #F5F0EA; padding-top: 2.5rem;">
      <div class="section-header">
        <h2 class="section-title">אלע דיעלס</h2>
        <p class="section-subtitle">קלייב אויס א דיעל וואס פאסט פאר דיר</p>
      </div>

      <div class="filter-bar" id="filter-bar">
        <button class="filter-btn active" data-filter="all">אלע</button>
        <button class="filter-btn" data-filter="low">נידעריגע ריזיקא</button>
        <button class="filter-btn" data-filter="medium">מיטעלע ריזיקא</button>
      </div>

      <div class="deals-grid" id="all-deals"></div>
    </section>

    <!-- CTA band -->
    <section class="cta-band">
      <h2>זעסט נישט וואס דו זוכסט?</h2>
      <p>מיר האבן מער דיעלס וואס קומען באלד — לאז אונז וויסן וואס דו זוכסט</p>
      <a class="btn btn-gold" href="contact.html">רעד מיט אונז</a>
    </section>

  </div>

  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    function createDealCard(deal) {
      var card = document.createElement("article");
      card.className = "deal-card";
      card.setAttribute("data-risk", deal.riskKey);
      card.innerHTML =
        '<img class="card-image" src="' + deal.image + '" alt="' + deal.name + '" loading="lazy">' +
        '<div class="card-body">' +
          '<div class="card-badges">' +
            '<span class="badge badge-location">' + deal.location + '</span>' +
            '<span class="badge badge-type">' + deal.propertyType + '</span>' +
          '</div>' +
          '<h3 class="card-title">' + deal.name + '</h3>' +
          '<div class="card-stats">' +
            '<div class="card-stat">' +
              '<div class="card-stat-label">קויפ פרייז</div>' +
              '<div class="card-stat-value">' + fmt(deal.purchasePrice) + '</div>' +
            '</div>' +
            '<div class="card-stat">' +
              '<div class="card-stat-label">ערווארטעטע פראפיט</div>' +
              '<div class="card-stat-value profit">' + fmt(deal.expectedProfit) + '</div>' +
            '</div>' +
            '<div class="card-stat">' +
              '<div class="card-stat-label">מאנאטל\' איינקונפט</div>' +
              '<div class="card-stat-value">' + fmt(deal.monthlyIncome) + '</div>' +
            '</div>' +
            '<div class="card-stat">' +
              '<div class="card-stat-label">ריזיקא</div>' +
              '<div class="card-stat-value"><span class="risk-badge risk-' + deal.riskKey + '">' + deal.riskLevel + '</span></div>' +
            '</div>' +
          '</div>' +
          '<div class="card-footer">' +
            '<a class="btn btn-primary" href="deal.html?id=' + deal.id + '">מער דעטאלן</a>' +
            '<a class="btn btn-whatsapp" href="' + whatsappLink(deal.name) + '" target="_blank" rel="noopener">וואטסאפ</a>' +
          '</div>' +
        '</div>';
      return card;
    }

    document.addEventListener("DOMContentLoaded", function() {
      var grid = document.getElementById("all-deals");
      deals.forEach(function(deal) {
        grid.appendChild(createDealCard(deal));
      });

      // Filter logic
      var buttons = document.querySelectorAll(".filter-btn");
      buttons.forEach(function(btn) {
        btn.addEventListener("click", function() {
          buttons.forEach(function(b) { b.classList.remove("active"); });
          btn.classList.add("active");

          var filter = btn.getAttribute("data-filter");
          var cards = grid.querySelectorAll(".deal-card");
          cards.forEach(function(card) {
            if (filter === "all" || card.getAttribute("data-risk") === filter) {
              card.style.display = "";
            } else {
              card.style.display = "none";
            }
          });
        });
      });
    });
  </script>
</body>
</html>
