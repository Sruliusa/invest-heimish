<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deal — Invest Heimish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page" id="deal-page">
    <!-- Content injected by JS -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async function() {
      var params = new URLSearchParams(window.location.search);
      var id = params.get("id");
      var deal = await getDealById(id);
      var page = document.getElementById("deal-page");

      if (!deal) {
        page.innerHTML =
          '<div class="empty-state" style="padding: 6rem 1.5rem;">' +
            '<h3>Deal not found</h3>' +
            '<p>Go back to <a href="deals.html" style="color:#6B2D3E; font-weight:700;">All Deals</a></p>' +
          '</div>';
        return;
      }

      document.title = deal.name + " — Invest Heimish";

      var roi = ((deal.expectedProfit / deal.cashNeeded) * 100).toFixed(0);

      page.innerHTML =
        '<div class="breadcrumb">' +
          '<a href="index.html">Home</a>' +
          '<span>/</span>' +
          '<a href="deals.html">Deals</a>' +
          '<span>/</span>' +
          deal.name +
        '</div>' +

        '<section class="deal-hero">' +
          '<div class="deal-hero-inner">' +
            '<img class="deal-hero-image" src="' + deal.image + '" alt="' + deal.name + '">' +
            '<div class="deal-hero-info">' +
              '<div class="deal-hero-meta">' +
                '<span class="badge badge-location">' + deal.location + '</span>' +
                '<span class="badge badge-type">' + deal.propertyType + '</span>' +
                '<span class="risk-badge risk-' + deal.riskKey + '">' + deal.riskLevel + ' Risk</span>' +
                '<span class="sale-status-badge sale-status-' + (deal.saleStatus || 'available') + '">' + (deal.saleStatus === 'contract' ? 'Contract for Sale' : deal.saleStatus === 'sold' ? 'Sold' : 'Available') + '</span>' +
              '</div>' +
              '<h1>' + deal.name + '</h1>' +
              '<p class="deal-hero-desc">' + deal.description + '</p>' +
              '<div class="deal-hero-buttons">' +
                '<a class="btn btn-whatsapp" href="' + whatsappLink(deal.name) + '" target="_blank" rel="noopener">Send WhatsApp about this deal</a>' +
                '<a class="btn btn-secondary" href="contact.html">Contact Us</a>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</section>' +

        '<section class="deal-details">' +
          '<div class="detail-grid">' +

            '<div class="detail-box">' +
              '<h3>Financial Details</h3>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Purchase Price</span>' +
                '<span class="detail-value">' + fmt(deal.purchasePrice) + '</span>' +
              '</div>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Renovation Cost</span>' +
                '<span class="detail-value">' + fmt(deal.renovationCost) + '</span>' +
              '</div>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Cash Needed</span>' +
                '<span class="detail-value">' + fmt(deal.cashNeeded) + '</span>' +
              '</div>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Min. Investment</span>' +
                '<span class="detail-value">' + fmt(deal.minimumInvestment) + '</span>' +
              '</div>' +
            '</div>' +

            '<div class="detail-box">' +
              '<h3>Expected Returns</h3>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Post-Renovation Value</span>' +
                '<span class="detail-value highlight">' + fmt(deal.postRenovationValue) + '</span>' +
              '</div>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Monthly Income</span>' +
                '<span class="detail-value highlight">' + fmt(deal.monthlyIncome) + '/mo</span>' +
              '</div>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Expected Profit</span>' +
                '<span class="detail-value highlight">' + fmt(deal.expectedProfit) + '</span>' +
              '</div>' +
              '<div class="detail-row">' +
                '<span class="detail-label">ROI</span>' +
                '<span class="detail-value highlight">' + roi + '%</span>' +
              '</div>' +
            '</div>' +

            '<div class="detail-box">' +
              '<h3>Property Details</h3>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Location</span>' +
                '<span class="detail-value">' + deal.location + '</span>' +
              '</div>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Type</span>' +
                '<span class="detail-value">' + deal.propertyType + '</span>' +
              '</div>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Bedrooms / Bathrooms</span>' +
                '<span class="detail-value">' + deal.bedrooms + ' / ' + deal.bathrooms + '</span>' +
              '</div>' +
              '<div class="detail-row">' +
                '<span class="detail-label">Renovation Timeline</span>' +
                '<span class="detail-value">' + deal.renovationTimeline + '</span>' +
              '</div>' +
            '</div>' +

            '<div class="detail-box">' +
              '<h3>More Information</h3>' +
              '<div style="padding: 0.5rem 0;">' +
                '<p class="detail-label" style="margin-bottom: 0.4rem; font-weight: 700;">Cost Breakdown</p>' +
                '<p style="font-size: 0.9rem; color: #555; line-height: 1.7;">' + deal.costBreakdown + '</p>' +
              '</div>' +
              '<div style="padding: 0.5rem 0; border-top: 1px solid #F5F5F5;">' +
                '<p class="detail-label" style="margin-bottom: 0.4rem; font-weight: 700;">What\'s Included</p>' +
                '<p style="font-size: 0.9rem; color: #555; line-height: 1.7;">' + deal.whatsIncluded + '</p>' +
              '</div>' +
            '</div>' +

          '</div>' +
        '</section>' +

        '<section class="cta-band">' +
          '<h2>Interested in this deal?</h2>' +
          '<p>Send us a message and we\'ll answer all your questions</p>' +
          '<a class="btn btn-gold" href="' + whatsappLink(deal.name) + '" target="_blank" rel="noopener">Send WhatsApp</a>' +
        '</section>';
    });
  </script>
</body>
</html>
