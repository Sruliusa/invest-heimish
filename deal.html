<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Deal — Invest Heimish</title>
  <meta name="robots" content="noindex, nofollow">
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin>
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="styles.css">
</head>
<body>

  <div class="page" id="deal-page">
    <!-- Content injected by JS -->
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script src="supabase-config.js"></script>
  <script src="data.js"></script>
  <script src="components.js"></script>
  <script>
    document.addEventListener("DOMContentLoaded", async function() {
      var { data: { user } } = await supabase.auth.getUser();
      if (!user) {
        sessionStorage.setItem('returnUrl', 'deal.html' + window.location.search);
        window.location.href = 'login.html';
        return;
      }

      var params = new URLSearchParams(window.location.search);
      var id = params.get("id");
      var deal = await getDealById(id);
      var page = document.getElementById("deal-page");

      if (!deal) {
        page.innerHTML =
          '<div class="empty-state" style="padding: 6rem 1.5rem;">' +
            '<h3>Deal not found</h3>' +
            '<p>Go back to <a href="deals.html" style="color:#6B2D3E; font-weight:700;">All Deals</a></p>' +
          '</div>';
        return;
      }

      document.title = deal.name + " — Invest Heimish";

      var allImages = deal.images && deal.images.length ? deal.images : [];
      if (deal.image) allImages = [deal.image].concat(allImages.filter(function(u) { return u !== deal.image; }));

      var galleryHtml = allImages.length > 1
        ? '<div class="deal-gallery">' +
            allImages.map(function(url, i) {
              return '<img class="deal-gallery-thumb' + (i === 0 ? ' active' : '') + '" src="' + url + '" alt="' + deal.name + ' photo ' + (i+1) + '" loading="lazy" onclick="setMainImage(this)">';
            }).join('') +
          '</div>'
        : '';

      var stratLabel = strategyLabel(deal.strategy);
      var strategyBadgeHtml = stratLabel
        ? '<span class="badge badge-type" style="background:#6B2D3E;color:#fff;">' + stratLabel + '</span>'
        : '';

      page.innerHTML =
        '<div class="breadcrumb">' +
          '<a href="index.html">Home</a>' +
          '<span>/</span>' +
          '<a href="deals.html">Deals</a>' +
          '<span>/</span>' +
          deal.name +
        '</div>' +

        '<section class="deal-hero">' +
          '<div class="deal-hero-inner">' +
            '<div class="deal-hero-media">' +
              '<img class="deal-hero-image" id="deal-main-image" src="' + (allImages[0] || deal.image) + '" alt="' + deal.name + '">' +
              galleryHtml +
            '</div>' +
            '<div class="deal-hero-info">' +
              '<div class="deal-hero-meta">' +
                strategyBadgeHtml +
                '<span class="badge badge-location">' + deal.location + '</span>' +
                '<span class="badge badge-type">' + deal.propertyType + '</span>' +
                '<span class="risk-badge risk-' + deal.riskKey + '">' + deal.riskLevel + ' Risk</span>' +
                '<span class="sale-status-badge sale-status-' + (deal.saleStatus || 'available') + '">' + (deal.saleStatus === 'contract' ? 'Contract for Sale' : deal.saleStatus === 'sold' ? 'Sold' : 'Available') + '</span>' +
              '</div>' +
              '<h1>' + deal.name + '</h1>' +
              '<p class="deal-hero-desc">' + (deal.description || '') + '</p>' +
              '<div class="deal-hero-buttons">' +
                '<a class="btn btn-gold" href="contact.html">Contact Us</a>' +
                '<a class="btn btn-secondary" href="deals.html">Back to Deals</a>' +
              '</div>' +
            '</div>' +
          '</div>' +
        '</section>' +

        '<section class="deal-details">' +
          '<div class="detail-grid">' +
            renderFinancialBox(deal) +
            renderReturnsBox(deal) +
            renderPropertyBox(deal) +
            renderMoreBox(deal) +
          '</div>' +
        '</section>' +

        '<section class="cta-band">' +
          '<h2>Interested in this deal?</h2>' +
          '<p>Contact us and we\'ll answer all your questions</p>' +
          '<a class="btn btn-gold" href="contact.html">Contact Us</a>' +
        '</section>';
    });

    function row(label, value, highlight) {
      return '<div class="detail-row">' +
        '<span class="detail-label">' + label + '</span>' +
        '<span class="detail-value' + (highlight ? ' highlight' : '') + '">' + value + '</span>' +
      '</div>';
    }

    function renderFinancialBox(deal) {
      var parts = '';
      parts += row('Purchase Price', fmt(deal.purchasePrice));
      if (deal.strategy === 'light' || deal.strategy === 'heavy' || (!deal.strategy && deal.renovationCost != null)) {
        parts += row('Renovation Cost', fmt(deal.renovationCost));
      }
      parts += row('Cash Needed', fmt(deal.cashNeeded));
      parts += row('Min. Investment', fmt(deal.minimumInvestment));
      return '<div class="detail-box"><h3>Financial Details</h3>' + parts + '</div>';
    }

    function renderReturnsBox(deal) {
      var parts = '';
      var title = 'Expected Returns';

      if (deal.strategy === 'tenants') {
        title = 'Cash Flow';
        parts += row('Monthly Income', fmt(deal.monthlyIncome) + '/mo', true);
        parts += row('Monthly Expenses', fmt(deal.monthlyExpenses) + '/mo');
        if (deal.monthlyIncome != null && deal.monthlyExpenses != null) {
          var net = deal.monthlyIncome - deal.monthlyExpenses;
          parts += row('Net Cash Flow', fmt(net) + '/mo', true);
          if (deal.purchasePrice) {
            var capRate = (net * 12 / deal.purchasePrice) * 100;
            parts += row('Cap Rate', capRate.toFixed(2) + '%', true);
          }
        }
      } else if (deal.strategy === 'light') {
        title = 'Rent: Before & After';
        parts += row('Current Rent', fmt(deal.currentRent) + '/mo');
        parts += row('Projected Rent (after reno)', fmt(deal.monthlyIncome) + '/mo', true);
        parts += row('Monthly Expenses', fmt(deal.monthlyExpenses) + '/mo');
        parts += row('Post-Renovation Value', fmt(deal.postRenovationValue), true);
      } else if (deal.strategy === 'heavy') {
        parts += row('Post-Renovation Value', fmt(deal.postRenovationValue), true);
        if (deal.resalePrice != null) parts += row('Resale Price', fmt(deal.resalePrice), true);
        if (deal.monthlyIncome != null) parts += row('Projected Rent (if held)', fmt(deal.monthlyIncome) + '/mo', true);
        parts += row('Expected Profit', fmt(deal.expectedProfit), true);
        if (deal.expectedProfit != null && deal.cashNeeded) {
          var roi = ((deal.expectedProfit / deal.cashNeeded) * 100).toFixed(0);
          parts += row('ROI', roi + '%', true);
        }
      } else {
        // Legacy fallback for rows saved before strategies were introduced.
        parts += row('Post-Renovation Value', fmt(deal.postRenovationValue), true);
        parts += row('Monthly Income', fmt(deal.monthlyIncome) + '/mo', true);
        parts += row('Expected Profit', fmt(deal.expectedProfit), true);
        if (deal.expectedProfit != null && deal.cashNeeded) {
          var roiLegacy = ((deal.expectedProfit / deal.cashNeeded) * 100).toFixed(0);
          parts += row('ROI', roiLegacy + '%', true);
        }
      }
      return '<div class="detail-box"><h3>' + title + '</h3>' + parts + '</div>';
    }

    function renderPropertyBox(deal) {
      var parts = '';
      parts += row('Location', deal.location || '—');
      parts += row('Type', deal.propertyType || '—');
      parts += row('Bedrooms / Bathrooms', (deal.bedrooms != null ? deal.bedrooms : '—') + ' / ' + (deal.bathrooms != null ? deal.bathrooms : '—'));
      if (deal.renovationTimeline) parts += row('Renovation Timeline', deal.renovationTimeline);
      return '<div class="detail-box"><h3>Property Details</h3>' + parts + '</div>';
    }

    function renderMoreBox(deal) {
      var blocks = '';
      if (deal.costBreakdown) {
        blocks +=
          '<div style="padding: 0.5rem 0;">' +
            '<p class="detail-label" style="margin-bottom: 0.4rem; font-weight: 700;">Cost Breakdown</p>' +
            '<p style="font-size: 0.9rem; color: #555; line-height: 1.7;">' + deal.costBreakdown + '</p>' +
          '</div>';
      }
      if (deal.whatsIncluded) {
        blocks +=
          '<div style="padding: 0.5rem 0;' + (deal.costBreakdown ? ' border-top: 1px solid #F5F5F5;' : '') + '">' +
            '<p class="detail-label" style="margin-bottom: 0.4rem; font-weight: 700;">What\'s Included</p>' +
            '<p style="font-size: 0.9rem; color: #555; line-height: 1.7;">' + deal.whatsIncluded + '</p>' +
          '</div>';
      }
      if (!blocks) return '';
      return '<div class="detail-box"><h3>More Information</h3>' + blocks + '</div>';
    }

    function setMainImage(thumb) {
      document.getElementById("deal-main-image").src = thumb.src;
      document.querySelectorAll(".deal-gallery-thumb").forEach(function(t) { t.classList.remove("active"); });
      thumb.classList.add("active");
    }
  </script>
</body>
</html>
