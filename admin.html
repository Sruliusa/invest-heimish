<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8">
  <meta name="viewport" content="width=device-width, initial-scale=1.0">
  <title>Admin — Invest Heimish</title>
  <link rel="preconnect" href="https://fonts.googleapis.com">
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&display=swap" rel="stylesheet">
  <link rel="stylesheet" href="admin.css">
</head>
<body>

  <!-- Login Screen -->
  <div id="login-screen" class="login-screen">
    <div class="login-card">
      <div class="login-brand">
        <h1 class="login-title">Invest <span class="brand-gold">Heimish</span></h1>
        <p class="login-sub">Admin Portal</p>
      </div>
      <div id="login-error" class="login-error" style="display:none;"></div>
      <div class="form-group">
        <label for="email">Email</label>
        <input type="email" id="email" placeholder="admin@example.com" autocomplete="email">
      </div>
      <div class="form-group">
        <label for="password">Password</label>
        <input type="password" id="password" placeholder="••••••••" autocomplete="current-password">
      </div>
      <button id="sign-in-btn" class="btn-primary" style="width:100%;">Sign In</button>
    </div>
  </div>

  <!-- Dashboard -->
  <div id="dashboard" class="dashboard" style="display:none;">
    <header class="admin-header">
      <span class="admin-brand">Invest <span class="brand-gold">Heimish</span> — Admin</span>
      <div class="admin-header-actions">
        <button id="add-deal-btn" class="btn-gold">+ Add Deal</button>
        <button id="logout-btn" class="btn-secondary">Logout</button>
      </div>
    </header>

    <main class="admin-main">
      <h2 class="deals-heading">All Deals</h2>
      <div class="table-wrapper">
        <table id="deals-table">
          <thead>
            <tr>
              <th>Name</th>
              <th>Location</th>
              <th>Risk</th>
              <th>Status</th>
              <th>Purchase Price</th>
              <th>Actions</th>
            </tr>
          </thead>
          <tbody id="deals-tbody"></tbody>
        </table>
      </div>
    </main>

    <!-- Side Panel -->
    <div id="side-panel" class="side-panel" style="display:none;">
      <div class="side-panel-header">
        <h3 id="panel-title">Add Deal</h3>
        <button id="close-panel-btn" class="close-btn" aria-label="Close">&times;</button>
      </div>
      <div class="side-panel-body">
        <form id="deal-form" novalidate>
          <input type="hidden" id="form-id">

          <!-- Property -->
          <div class="form-section">
            <p class="form-section-title">Property</p>
            <div class="form-group">
              <label>Deal Name *</label>
              <input type="text" id="form-name" required>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Location</label>
                <input type="text" id="form-location" placeholder="e.g. Brooklyn, NY">
              </div>
              <div class="form-group">
                <label>Property Type</label>
                <input type="text" id="form-propertyType" placeholder="e.g. Two-Family House">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Bedrooms</label>
                <input type="number" id="form-bedrooms" min="0">
              </div>
              <div class="form-group">
                <label>Bathrooms</label>
                <input type="number" id="form-bathrooms" min="0">
              </div>
            </div>
            <div class="form-group">
              <label>Sale Status</label>
              <select id="form-saleStatus">
                <option value="">Available</option>
                <option value="contract">Contract for Sale</option>
                <option value="sold">Sold</option>
              </select>
            </div>
          </div>

          <!-- Financials -->
          <div class="form-section">
            <p class="form-section-title">Financials</p>
            <div class="form-row">
              <div class="form-group">
                <label>Purchase Price ($)</label>
                <input type="number" id="form-purchasePrice" min="0">
              </div>
              <div class="form-group">
                <label>Renovation Cost ($)</label>
                <input type="number" id="form-renovationCost" min="0">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Cash Needed ($)</label>
                <input type="number" id="form-cashNeeded" min="0">
              </div>
              <div class="form-group">
                <label>Minimum Investment ($)</label>
                <input type="number" id="form-minimumInvestment" min="0">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Post-Renovation Value ($)</label>
                <input type="number" id="form-postRenovationValue" min="0">
              </div>
              <div class="form-group">
                <label>Monthly Income ($)</label>
                <input type="number" id="form-monthlyIncome" min="0">
              </div>
            </div>
            <div class="form-row">
              <div class="form-group">
                <label>Expected Profit ($)</label>
                <input type="number" id="form-expectedProfit" min="0">
              </div>
              <div class="form-group">
                <label>Risk Level</label>
                <select id="form-riskLevel">
                  <option value="Low">Low</option>
                  <option value="Medium">Medium</option>
                  <option value="High">High</option>
                </select>
              </div>
            </div>
          </div>

          <!-- Deal Details -->
          <div class="form-section">
            <p class="form-section-title">Deal Details</p>
            <div class="form-group">
              <label>Renovation Timeline</label>
              <input type="text" id="form-renovationTimeline" placeholder="e.g. 4–6 months">
            </div>
            <div class="form-group">
              <label>Cost Breakdown</label>
              <input type="text" id="form-costBreakdown" placeholder="Purchase: $X | Renov: $Y | ...">
            </div>
            <div class="form-group">
              <label>What's Included</label>
              <textarea id="form-whatsIncluded" rows="4"></textarea>
            </div>
            <div class="form-group">
              <label>Description</label>
              <textarea id="form-description" rows="5"></textarea>
            </div>
          </div>

          <!-- Media -->
          <div class="form-section">
            <p class="form-section-title">Media</p>
            <div class="form-group">
              <label>Image URL</label>
              <input type="text" id="form-image" placeholder="https://...">
              <img id="form-image-preview" class="image-preview" src="" alt="preview" style="display:none;">
            </div>
          </div>

          <div id="form-error" class="login-error" style="display:none;"></div>

          <div class="form-actions">
            <button type="submit" class="btn-gold">Save Deal</button>
            <button type="button" id="form-cancel-btn" class="btn-secondary">Cancel</button>
          </div>
        </form>
      </div>
    </div>
    <div id="panel-overlay" class="panel-overlay" style="display:none;"></div>
  </div>

  <script src="https://cdn.jsdelivr.net/npm/@supabase/supabase-js@2"></script>
  <script>
    // ── Init ──────────────────────────────────────────────────────────────────
    var db;
    try {
      var _mod = window.supabase;
      db = _mod.createClient(
        'https://owavyvaparyftjxwcocr.supabase.co',
        'eyJhbGciOiJIUzI1NiIsInR5cCI6IkpXVCJ9.eyJpc3MiOiJzdXBhYmFzZSIsInJlZiI6Im93YXZ5dmFwYXJ5ZnRqeHdjb2NyIiwicm9sZSI6ImFub24iLCJpYXQiOjE3NzY2MzQ3NTIsImV4cCI6MjA5MjIxMDc1Mn0._c2i5hFpBa03yggCJGOsEJvtnnCBZD-AxOOJWJrNnVg'
      );
    } catch (e) {
      console.error('Supabase init failed:', e);
    }

    var editingId = null;
    var riskKeyMap = { Low: 'low', Medium: 'medium', High: 'high' };
    var saleStatusMap = { contract: 'Contract', sold: 'Sold' };
    function saleStatusPill(s) {
      if (!s) return '<span style="color:#999">Available</span>';
      return '<span class="status-pill status-' + s + '">' + (saleStatusMap[s] || s) + '</span>';
    }

    function showErr(elId, msg) {
      var el = document.getElementById(elId);
      el.textContent = msg;
      el.style.display = 'block';
    }

    // ── Login ─────────────────────────────────────────────────────────────────
    document.getElementById('sign-in-btn').addEventListener('click', async function() {
      document.getElementById('login-error').style.display = 'none';
      if (!db) { showErr('login-error', 'App not initialized — refresh the page.'); return; }
      var email    = document.getElementById('email').value.trim();
      var password = document.getElementById('password').value;
      var result   = await db.auth.signInWithPassword({ email: email, password: password });
      if (result.error) showErr('login-error', result.error.message);
    });

    document.getElementById('password').addEventListener('keydown', function(e) {
      if (e.key === 'Enter') document.getElementById('sign-in-btn').click();
    });

    // ── Logout ────────────────────────────────────────────────────────────────
    document.getElementById('logout-btn').addEventListener('click', async function() {
      if (db) await db.auth.signOut();
    });

    // ── Auth state ────────────────────────────────────────────────────────────
    if (db) {
      db.auth.onAuthStateChange(function(event, session) {
        if (session) {
          document.getElementById('login-screen').style.display = 'none';
          document.getElementById('dashboard').style.display = 'flex';
          loadDealsTable();
        } else {
          document.getElementById('login-screen').style.display = 'flex';
          document.getElementById('dashboard').style.display = 'none';
        }
      });
    }

    // ── Load deals table ──────────────────────────────────────────────────────
    async function loadDealsTable() {
      var result = await db.from('deals').select('*').order('id');
      var tbody  = document.getElementById('deals-tbody');
      tbody.innerHTML = '';
      if (result.error || !result.data) return;
      result.data.forEach(function(row) {
        var tr = document.createElement('tr');
        tr.innerHTML =
          '<td>' + esc(row.name) + '</td>' +
          '<td>' + esc(row.location || '') + '</td>' +
          '<td><span class="risk-pill risk-' + esc(row.risk_key || '') + '">' + esc(row.risk_level || '') + '</span></td>' +
          '<td>' + saleStatusPill(row.sale_status) + '</td>' +
          '<td>' + (row.purchase_price ? '$' + Number(row.purchase_price).toLocaleString('en-US') : '—') + '</td>' +
          '<td class="actions-cell">' +
            '<button class="btn-edit" data-id="' + row.id + '">Edit</button>' +
            '<button class="btn-delete" data-id="' + row.id + '">Delete</button>' +
          '</td>';
        tbody.appendChild(tr);
      });
      tbody.querySelectorAll('.btn-edit').forEach(function(btn) {
        btn.addEventListener('click', function() { openEditPanel(Number(btn.dataset.id)); });
      });
      tbody.querySelectorAll('.btn-delete').forEach(function(btn) {
        btn.addEventListener('click', function() { deleteDeal(Number(btn.dataset.id)); });
      });
    }

    // ── Delete ────────────────────────────────────────────────────────────────
    async function deleteDeal(id) {
      if (!confirm('Delete this deal? This cannot be undone.')) return;
      await db.from('deals').delete().eq('id', id);
      loadDealsTable();
    }

    // ── Add deal button ───────────────────────────────────────────────────────
    document.getElementById('add-deal-btn').addEventListener('click', function() {
      editingId = null;
      document.getElementById('panel-title').textContent = 'Add Deal';
      document.getElementById('deal-form').reset();
      document.getElementById('form-id').value = '';
      document.getElementById('form-image-preview').style.display = 'none';
      document.getElementById('form-error').style.display = 'none';
      openPanel();
    });

    // ── Edit panel ────────────────────────────────────────────────────────────
    async function openEditPanel(id) {
      var result = await db.from('deals').select('*').eq('id', id).single();
      if (result.error || !result.data) return;
      var r = result.data;
      editingId = id;
      document.getElementById('panel-title').textContent = 'Edit Deal';
      document.getElementById('form-id').value = id;
      document.getElementById('form-name').value = r.name || '';
      document.getElementById('form-location').value = r.location || '';
      document.getElementById('form-propertyType').value = r.property_type || '';
      document.getElementById('form-bedrooms').value = r.bedrooms != null ? r.bedrooms : '';
      document.getElementById('form-bathrooms').value = r.bathrooms != null ? r.bathrooms : '';
      document.getElementById('form-purchasePrice').value = r.purchase_price != null ? r.purchase_price : '';
      document.getElementById('form-renovationCost').value = r.renovation_cost != null ? r.renovation_cost : '';
      document.getElementById('form-cashNeeded').value = r.cash_needed != null ? r.cash_needed : '';
      document.getElementById('form-minimumInvestment').value = r.minimum_investment != null ? r.minimum_investment : '';
      document.getElementById('form-postRenovationValue').value = r.post_renovation_value != null ? r.post_renovation_value : '';
      document.getElementById('form-monthlyIncome').value = r.monthly_income != null ? r.monthly_income : '';
      document.getElementById('form-expectedProfit').value = r.expected_profit != null ? r.expected_profit : '';
      document.getElementById('form-riskLevel').value = r.risk_level || 'Low';
      document.getElementById('form-renovationTimeline').value = r.renovation_timeline || '';
      document.getElementById('form-costBreakdown').value = r.cost_breakdown || '';
      document.getElementById('form-whatsIncluded').value = r.whats_included || '';
      document.getElementById('form-description').value = r.description || '';
      document.getElementById('form-image').value = r.image || '';
      document.getElementById('form-saleStatus').value = r.sale_status || '';
      setImagePreview(r.image);
      document.getElementById('form-error').style.display = 'none';
      openPanel();
    }

    // ── Panel open / close ────────────────────────────────────────────────────
    function openPanel() {
      document.getElementById('side-panel').style.display = 'flex';
      document.getElementById('panel-overlay').style.display = 'block';
    }
    function closePanel() {
      document.getElementById('side-panel').style.display = 'none';
      document.getElementById('panel-overlay').style.display = 'none';
    }
    document.getElementById('close-panel-btn').addEventListener('click', closePanel);
    document.getElementById('form-cancel-btn').addEventListener('click', closePanel);
    document.getElementById('panel-overlay').addEventListener('click', closePanel);

    // ── Image preview ─────────────────────────────────────────────────────────
    document.getElementById('form-image').addEventListener('input', function() {
      setImagePreview(this.value);
    });
    function setImagePreview(url) {
      var el = document.getElementById('form-image-preview');
      if (url) { el.src = url; el.style.display = 'block'; }
      else { el.style.display = 'none'; }
    }

    // ── Form submit ───────────────────────────────────────────────────────────
    document.getElementById('deal-form').addEventListener('submit', async function(e) {
      e.preventDefault();
      document.getElementById('form-error').style.display = 'none';
      var nameVal = document.getElementById('form-name').value.trim();
      if (!nameVal) { showErr('form-error', 'Deal Name is required.'); return; }

      var riskLevel = document.getElementById('form-riskLevel').value;
      var obj = {
        name: nameVal,
        location:              document.getElementById('form-location').value.trim(),
        property_type:         document.getElementById('form-propertyType').value.trim(),
        bedrooms:              numOrNull('form-bedrooms'),
        bathrooms:             numOrNull('form-bathrooms'),
        purchase_price:        numOrNull('form-purchasePrice'),
        renovation_cost:       numOrNull('form-renovationCost'),
        cash_needed:           numOrNull('form-cashNeeded'),
        minimum_investment:    numOrNull('form-minimumInvestment'),
        post_renovation_value: numOrNull('form-postRenovationValue'),
        monthly_income:        numOrNull('form-monthlyIncome'),
        expected_profit:       numOrNull('form-expectedProfit'),
        risk_level:            riskLevel,
        risk_key:              riskKeyMap[riskLevel] || 'low',
        renovation_timeline:   document.getElementById('form-renovationTimeline').value.trim(),
        cost_breakdown:        document.getElementById('form-costBreakdown').value.trim(),
        whats_included:        document.getElementById('form-whatsIncluded').value.trim(),
        description:           document.getElementById('form-description').value.trim(),
        image:                 document.getElementById('form-image').value.trim(),
        sale_status:           document.getElementById('form-saleStatus').value || null,
      };

      var result = editingId
        ? await db.from('deals').update(obj).eq('id', editingId)
        : await db.from('deals').insert([obj]);

      if (result.error) { showErr('form-error', result.error.message); return; }
      closePanel();
      loadDealsTable();
    });

    // ── Helpers ───────────────────────────────────────────────────────────────
    function numOrNull(id) {
      var v = document.getElementById(id).value;
      return v === '' ? null : Number(v);
    }
    function esc(str) {
      return String(str)
        .replace(/&/g, '&amp;').replace(/</g, '&lt;')
        .replace(/>/g, '&gt;').replace(/"/g, '&quot;');
    }
  </script>
</body>
</html>
